name: Feature request
description: 新機能・新仕様・大きめの変更提案
title: "[feature] "
labels: ["type:feature"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: 背景・目的
      description: なぜ必要か。解決したい課題は何か。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: どう実現するか。代替案があれば併記。
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: スコープ / 非スコープ
      description: 今回やること / やらないことを明確化。
  - type: textarea
    id: docs
    attributes:
      label: 影響する仕様書
      description: 追加・更新が必要な `docs/*.md` を列挙。
      placeholder: |
        - docs/architecture.md(更新)
        - docs/protocol-p3.md(更新)
  - type: dropdown
    id: area
    attributes:
      label: 影響範囲(area)
      multiple: true
      options:
        - area:gateway
        - area:web
        - area:protocol
        - area:ops
        - area:ci
        - area:docs
  - type: textarea
    id: acceptance
    attributes:
      label: 完了条件(Acceptance Criteria)
      placeholder: |
        - [ ] xxx が動作する
        - [ ] docs/yyy.md が更新されている
