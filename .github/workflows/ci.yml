name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.20.x'
          cache: true
          cache-dependency-path: gateway/go.sum

      - name: gofmt -s -d (fail on diff)
        run: |
          out=$(gofmt -s -d .)
          if [ -n "$out" ]; then
            echo "$out"
            echo "::error::gofmt found diffs"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test -race
        run: go test -race -count=1 ./...

      - name: go build
        run: go build ./cmd/gateway
