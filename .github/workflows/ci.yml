name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.20.x'
          cache: true
          cache-dependency-path: gateway/go.sum

      - name: gofmt -s -d (fail on diff)
        run: |
          out=$(gofmt -s -d .)
          if [ -n "$out" ]; then
            echo "$out"
            echo "::error::gofmt found diffs"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test -race
        run: go test -race -count=1 ./...

      - name: go build
        run: go build -o gateway-bin ./cmd/gateway

      - name: smoke (--mock + /healthz)
        run: |
          set -euo pipefail
          ./gateway-bin --mock --listen :18080 &
          GW_PID=$!
          # Give the server a moment to bind.
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:18080/healthz >/tmp/h.json 2>/dev/null; then
              break
            fi
            sleep 0.2
          done
          if [ ! -s /tmp/h.json ]; then
            echo "::error::/healthz never responded"
            kill -TERM $GW_PID || true
            wait $GW_PID || true
            exit 1
          fi
          echo "/healthz response:"; cat /tmp/h.json; echo
          # Sanity-check the JSON shape.
          grep -q '"upstream":"mock"' /tmp/h.json
          grep -q '"version":"' /tmp/h.json
          # Stop the gateway.
          kill -INT $GW_PID
          wait $GW_PID
          echo "smoke OK"

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: 'web/.nvmrc'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: npm ci
        run: npm ci

      - name: typecheck
        run: npm run typecheck

      - name: lint
        run: npm run lint

      - name: prettier check
        run: npm run format

      - name: test
        run: npm run test -- --run

      - name: build
        run: npm run build
