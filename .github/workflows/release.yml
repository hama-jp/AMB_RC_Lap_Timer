name: Release

# Triggered by `git tag vX.Y.Z` (or `vX.Y.Z-rc<n>`) followed by
# `git push origin vX.Y.Z`. The job builds the SPA, cross-compiles
# `gateway.exe` for Windows amd64, bundles the operator-facing files,
# zips the bundle, computes a SHA-256, and creates a GitHub Release with
# the artifacts attached.
#
# Pre-release detection: tag matching `vX.Y.0-rc<n>` is published as a
# pre-release; everything else (including `v0.1.1`) is published as a
# stable release. See docs/release.md for the operator-facing runbook.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  # Required for softprops/action-gh-release to create the Release.
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Mirror CI versions exactly so the artifact a contributor reproduces
      # locally with `scripts/build.ps1` matches what we ship.
      - uses: actions/setup-go@v5
        with:
          go-version: '1.20.x'
          cache: true
          cache-dependency-path: gateway/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version-file: 'web/.nvmrc'
          cache: npm
          cache-dependency-path: web/package-lock.json

      # ‚îÄ‚îÄ 1. SPA build ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Build SPA
        working-directory: web
        run: |
          npm ci
          npm run build

      # ‚îÄ‚îÄ 2. Copy web/dist/* ‚Üí gateway/internal/webassets/dist/ ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      # Wipes the embed dir except .gitkeep to avoid stale artifacts. The
      # `.gitkeep` survives so `go:embed all:dist` keeps a non-empty target
      # across clean checkouts (matches scripts/build.ps1 ¬ß2 behaviour).
      - name: Embed SPA bundle into gateway
        run: |
          set -euo pipefail
          embed=gateway/internal/webassets/dist
          find "$embed" -mindepth 1 ! -name '.gitkeep' -delete
          cp -R web/dist/. "$embed"/

      # ‚îÄ‚îÄ 3. Cross-compile gateway.exe ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Cross-compile gateway.exe (Windows amd64)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        working-directory: gateway
        run: |
          set -euo pipefail
          mkdir -p ../dist/AMB_RC_Lap_Timer
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o ../dist/AMB_RC_Lap_Timer/gateway.exe \
            ./cmd/gateway
          ls -lh ../dist/AMB_RC_Lap_Timer/gateway.exe

      # ‚îÄ‚îÄ 4. Bundle operator-facing files ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      # Same set scripts/build.ps1 ¬ß4 emits: config.example.json (so the
      # gateway's first-launch ensureConfigFile bootstrap finds a template
      # next to the EXE) and README.txt (the printable user manual).
      - name: Bundle config.example.json + README.txt
        run: |
          set -euo pipefail
          cp gateway/config.example.json   dist/AMB_RC_Lap_Timer/config.example.json
          cp packaging/README.txt          dist/AMB_RC_Lap_Timer/README.txt
          ls -lh dist/AMB_RC_Lap_Timer/

      # ‚îÄ‚îÄ 5. ZIP the bundle ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      # Single top-level folder inside the ZIP so users can drag it onto a
      # USB stick without first creating a wrapper directory.
      - name: Create release ZIP
        id: zip
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          zip_name="AMB_RC_Lap_Timer-${tag}.zip"
          (cd dist && zip -r "../${zip_name}" AMB_RC_Lap_Timer/)
          ls -lh "${zip_name}"
          echo "zip_name=${zip_name}" >> "$GITHUB_OUTPUT"

      # ‚îÄ‚îÄ 6. SHA-256 ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Compute SHA-256
        id: sha
        run: |
          set -euo pipefail
          zip_name="${{ steps.zip.outputs.zip_name }}"
          sha_name="${zip_name}.sha256"
          sha256sum "${zip_name}" > "${sha_name}"
          cat "${sha_name}"
          echo "sha_name=${sha_name}" >> "$GITHUB_OUTPUT"

      # ‚îÄ‚îÄ 7. Build the prepended release notes section ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      # Operators see this BEFORE GitHub's auto-generated PR / commit list,
      # which is appended below it via `generate_release_notes: true`.
      - name: Compose release notes prefix
        id: notes
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          zip_name="${{ steps.zip.outputs.zip_name }}"
          sha_line=$(cut -d ' ' -f 1 "${{ steps.sha.outputs.sha_name }}")
          cat > release-notes-prefix.md <<EOF
          ## ${tag}

          ÂÄã‰∫∫Á∑¥ÁøíÁî® AMB RC „É©„ÉÉ„Éó„Çø„Ç§„Éû„Éº Web „Ç¢„Éó„É™„ÅÆ„É™„É™„Éº„Çπ„ÄÇ

          ### ÂêåÊ¢±Áâ©(\`${zip_name}\`)
          - \`gateway.exe\`(Windows amd64„ÄÅSmartScreen ÂàùÂõûÊâøË™çË¶Å)
          - \`config.example.json\`(Ë®≠ÂÆö„Å≤„Å™Âûã)
          - \`README.txt\`(ÁèæÂú∞„Ç¨„Ç§„Éâ„ÄÅÂç∞Âà∑ÂèØ)

          ### Âãï‰ΩúË¶Å‰ª∂
          - Windows 8.1 ‰ª•‰∏ä„ÄÅ„Ç≤„Éº„Éà„Ç¶„Çß„Ç§ PC „Å®„Åó„Å¶
          - LAN ÂÜÖ„ÅÆ„Çπ„Éû„Éõ / „Çø„Éñ„É¨„ÉÉ„Éà(Web Speech API ÂØæÂøú„ÅÆ„É¢„ÉÄ„É≥„Éñ„É©„Ç¶„Ç∂)
          - AMB P3 „Éá„Ç≥„Éº„ÉÄ„Éº„ÅåÂêå LAN „Å´„ÅÑ„Çã„Åì„Å®

          ### Ëµ∑ÂãïÊñπÊ≥ï
          ZIP „Çí‰ªªÊÑè„ÅÆÂÝ¥ÊâÄ(USB Áõ¥‰∏ãÊé®Â•®)„Å´Â±ïÈñã ‚Üí \`config.json\` „Åß AMB „ÅÆ IP „ÇíÁ∑®ÈõÜ ‚Üí \`gateway.exe\` „Çí„ÉÄ„Éñ„É´„ÇØ„É™„ÉÉ„ÇØ ‚Üí „Çπ„Éû„Éõ„Åß \`http://<„Åì„ÅÆPC„ÅÆIP>:8080/\`„ÄÇË©≥Á¥∞„ÅØÂêåÊ¢±„ÅÆ \`README.txt\`„ÄÇ

          ### Ê§úË®ºÊ∏à„Åø„ÅÆÂãï‰ΩúÁí∞Â¢É
          - Windows 11 Home build 26200(Œ≤-1 / Œ≤-2 Ê§úË®ºÊ©ü)
          - iPhone Safari(\`docs/field-test-log.md\` Œ≤-1 ÂÖ® 9 „Ç∑„Éä„É™„Ç™ ‚úÖ)

          ### SHA-256
          \`\`\`
          ${sha_line}  ${zip_name}
          \`\`\`
          EOF
          echo "prefix_path=release-notes-prefix.md" >> "$GITHUB_OUTPUT"

      # ‚îÄ‚îÄ 8. Decide pre-release flag ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      # `vX.Y.0-rc<n>` is a release-candidate (the rc-runs we use during
      # the Œ≤-2 prep window). `vX.Y.Z` (no `-rc`) is stable. Anything
      # else (e.g., `v0.1.1-beta`) defaults to stable too ‚Äî we don't ship
      # named pre-release channels other than rc.
      - name: Determine pre-release flag
        id: prerelease
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.0-rc[0-9]+$ ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      # ‚îÄ‚îÄ 9. Publish the Release ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.prefix_path }}
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.value == 'true' }}
          fail_on_unmatched_files: true
          files: |
            ${{ steps.zip.outputs.zip_name }}
            ${{ steps.sha.outputs.sha_name }}
